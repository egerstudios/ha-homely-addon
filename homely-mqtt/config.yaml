name: "Homely MQTT"
description: "Bridges the Homely alarm system to MQTT with Home Assistant auto-discovery. Supports real-time updates via WebSocket and periodic polling."
version: "1.0.0"
slug: "homely_mqtt"
url: "https://github.com/egerstudios/ha-homely-addon"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  homely_username: ""
  homely_password: ""
  homely_home: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery_prefix: "homeassistant"
  mqtt_state_prefix: "homely"
  poll_interval: 120
  log_level: "info"
schema:
  homely_username: str
  homely_password: password
  homely_home: str?
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: password?
  mqtt_discovery_prefix: str
  mqtt_state_prefix: str
  poll_interval: int(30,3600)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
